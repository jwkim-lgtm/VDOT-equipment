<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDOT 장비 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;}
.app{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.brand{font-size:12px;font-weight:600;color:#888;letter-spacing:.1em;}
.title{font-size:22px;font-weight:600;}
.header-right{display:flex;align-items:center;gap:10px;}
.role-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;background:#1a1a1a;color:#fff;cursor:pointer;border:none;font-family:inherit;}
.sync-wrap{display:flex;align-items:center;gap:5px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#27ae60;flex-shrink:0;}
.sync-dot.off{background:#e0e0e0;}
.sync-label{font-size:11px;color:#888;}
.stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:2rem;}
.stat-card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #e8e8e8;}
.stat-label{font-size:11px;color:#888;margin-bottom:5px;font-weight:500;}
.stat-value{font-size:20px;font-weight:600;}
.stat-value.pending{color:#e67e22;}.stat-value.out{color:#1a6fb8;}.stat-value.overdue{color:#c0392b;}.stat-value.internal{color:#8e44ad;}
.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid #e0e0e0;overflow-x:auto;}
.tab{padding:10px 15px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600;}
.tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#e67e22;margin-left:5px;vertical-align:middle;}
.sub-tab-bar{display:flex;gap:6px;margin-bottom:1rem;}
.sub-tab{padding:5px 14px;font-size:12px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;font-family:inherit;}
.sub-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:600;}
.btn{padding:8px 16px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit;font-weight:500;}
.btn:hover{background:#f5f5f5;}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}.btn-primary:hover{background:#333;}
.btn-success{background:#27ae60;color:#fff;border-color:#27ae60;}.btn-success:hover{background:#219a52;}
.btn-danger{border-color:#e0b0b0;color:#c0392b;}.btn-danger:hover{background:#fff0f0;}
.btn-pdf{background:#8e44ad;color:#fff;border-color:#8e44ad;}.btn-pdf:hover{background:#7d3c98;}
.btn-sm{padding:5px 11px;font-size:12px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:13px;font-weight:600;color:#888;}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;}
.filter-bar input{flex:1;min-width:140px;}
.table-wrap{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#fafafa;padding:9px 14px;text-align:left;font-weight:600;font-size:11px;color:#888;border-bottom:1px solid #e8e8e8;white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:middle;}
tr:last-child td{border-bottom:none;}tr:hover td{background:#fafafa;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-in{background:#e8f5e9;color:#2e7d32;}.badge-out{background:#e3f2fd;color:#1565c0;}
.badge-overdue{background:#ffebee;color:#c62828;}.badge-rejected{background:#f5f5f5;color:#888;}
.badge-internal{background:#f3e5f5;color:#7b1fa2;border:1px solid #e1bee7;}
.badge-backup{background:#fff3e0;color:#e65100;}.badge-backup-done{background:#e8f5e9;color:#2e7d32;}
.eq-code{font-family:monospace;font-size:12px;color:#1565c0;background:#e3f2fd;padding:2px 7px;border-radius:4px;font-weight:600;}
.eq-name{font-size:13px;color:#2e7d32;font-weight:500;}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:#f0f0f0;color:#555;}
.req-eq-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:14px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-start;justify-content:center;padding-top:3vh;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:1.75rem;width:700px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.15);margin-bottom:3vh;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:1.25rem;}
.form-row{margin-bottom:14px;}
.form-label{font-size:12px;color:#888;margin-bottom:5px;display:block;font-weight:500;}
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;}
input:focus,select:focus{border-color:#1a1a1a;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.5rem;padding-top:12px;border-top:1px solid #f0f0f0;}
/* 장비 체크리스트 — 장비별 유형 선택 */
.eq-checklist{max-height:320px;overflow-y:auto;border:1px solid #e8e8e8;border-radius:8px;}
.eq-check-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #f0f0f0;}
.eq-check-item:last-child{border-bottom:none;}
.eq-check-item.disabled{opacity:.4;cursor:not-allowed;background:#fafafa;}
.eq-check-item input[type=checkbox]{width:16px;height:16px;flex-shrink:0;accent-color:#1a1a1a;cursor:pointer;}
.eq-check-item.disabled input[type=checkbox]{cursor:not-allowed;}
.eq-check-info{flex:1;min-width:0;}
.eq-check-name{font-size:13px;}
.eq-check-sub{font-size:11px;color:#888;margin-top:2px;}
/* 장비별 유형 토글 */
.item-type-toggle{display:none;gap:4px;flex-shrink:0;}
.eq-check-item.checked .item-type-toggle{display:flex;}
.type-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid #ddd;background:#fff;color:#aaa;cursor:pointer;font-family:inherit;white-space:nowrap;}
.type-pill.normal.active{border-color:#1565c0;background:#e3f2fd;color:#1565c0;}
.type-pill.internal.active{border-color:#7b1fa2;background:#f3e5f5;color:#7b1fa2;}
.hdd-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:10px;}
.hdd-project-title{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.hdd-chips{display:flex;flex-wrap:wrap;gap:6px;}
.hdd-chip{padding:4px 10px;border-radius:20px;font-size:12px;background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb;display:flex;align-items:center;gap:5px;}
.hdd-chip.backing{background:#fff3e0;color:#e65100;border-color:#ffe0b2;}
.hdd-chip.backed{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9;}
.notif-bar{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:12px 16px;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.pdf-preview{background:#fff;border:1px solid #ddd;border-radius:8px;padding:2rem;}
.pdf-preview h2{text-align:center;font-size:18px;margin-bottom:1rem;border-bottom:2px solid #1a1a1a;padding-bottom:.5rem;}
.pdf-preview .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;font-size:13px;}
.pdf-preview .meta-item{display:flex;gap:8px;}
.pdf-preview .meta-label{color:#888;min-width:70px;}
.pdf-preview table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem;}
.pdf-preview th{background:#f5f5f5;padding:8px;border:1px solid #ddd;text-align:center;font-size:12px;}
.pdf-preview td{padding:8px;border:1px solid #ddd;text-align:center;}
.pdf-preview .sign-area{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;}
.pdf-preview .sign-box{border:1px solid #ddd;border-radius:6px;padding:12px;text-align:center;}
.pdf-preview .sign-label{font-size:11px;color:#888;margin-bottom:20px;}
.pdf-preview .sign-name{font-size:13px;font-weight:600;}
@media print{body{background:#fff;}.app,.tab-bar,.stats-grid,.header{display:none!important;}.modal-overlay{position:static!important;background:none!important;display:block!important;padding:0;}.modal{box-shadow:none!important;max-height:none!important;width:100%!important;padding:0!important;border-radius:0!important;}.modal-footer,.modal-title{display:none!important;}#modal-pdf{display:block!important;}}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(3,1fr);}.form-grid,.form-grid-3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><div class="brand">VDOT</div><div class="title">장비 관리</div></div>
    <div class="header-right">
      <div class="sync-wrap"><span class="sync-dot off" id="sync-dot"></span><span class="sync-label" id="sync-label">연결 중...</span></div>
      <button class="role-btn" onclick="toggleRole()" id="role-display">관리자 모드</button>
      <button class="btn btn-primary" onclick="openRequest()">+ 반출 신청</button>
    </div>
  </div>
  <div id="notif-bar-wrap"></div>
  <div class="stats-grid" id="stats"></div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('status',this)">반출 현황</button>
    <button class="tab" id="tab-btn-admin" onclick="switchTab('admin',this)">신청 관리 <span class="dot" id="pending-dot" style="display:none"></span></button>
    <button class="tab" onclick="switchTab('equipment',this)">장비 목록</button>
    <button class="tab" onclick="switchTab('hdd',this)">외장하드</button>
    <button class="tab" onclick="switchTab('backup',this)">백업 현황</button>
    <button class="tab" onclick="switchTab('history',this)">반출 이력</button>
  </div>
  <div id="tab-status"><div style="text-align:center;padding:2rem;color:#aaa;font-size:13px">데이터 불러오는 중...</div></div>
  <div id="tab-admin" style="display:none"></div>
  <div id="tab-equipment" style="display:none"></div>
  <div id="tab-hdd" style="display:none"></div>
  <div id="tab-backup" style="display:none"></div>
  <div id="tab-history" style="display:none"></div>
</div>

<!-- 반출 신청 모달 -->
<div class="modal-overlay" id="modal-request">
  <div class="modal">
    <div class="modal-title">반출 신청</div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">신청자</label><input type="text" id="req-person" placeholder="이름"></div>
      <div class="form-row"><label class="form-label">프로젝트</label><input type="text" id="req-project" placeholder="프로젝트명 (선택)"></div>
    </div>
    <div class="form-grid-3">
      <div class="form-row"><label class="form-label">반출일</label><input type="date" id="req-out"></div>
      <div class="form-row"><label class="form-label">예정 반납일 <span style="color:#aaa;font-weight:400">(일반 반출 기준)</span></label><input type="date" id="req-ret"></div>
      <div class="form-row"><label class="form-label">승인자</label>
        <select id="req-approver">
          <option value="김종원">김종원</option>
          <option value="양수빈">양수빈</option>
          <option value="이상협">이상협</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label class="form-label">메모</label><input type="text" id="req-note" placeholder="(선택)"></div>
    <div class="form-row">
      <label class="form-label">장비 선택
        <span style="color:#aaa;font-weight:400"> — 체크 후 각 장비의 반출 유형을 선택해주세요</span>
      </label>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input type="text" id="req-search" placeholder="장비명 또는 코드 검색" oninput="filterReqList()" style="flex:1;">
        <select id="req-cat-f" onchange="filterReqList()" style="width:auto;min-width:90px;"></select>
      </div>
      <!-- 범례 -->
      <div style="display:flex;gap:8px;margin-bottom:8px;font-size:11px;color:#888;align-items:center;">
        <span>체크 후 유형 선택 →</span>
        <span style="padding:2px 8px;border-radius:20px;border:1.5px solid #1565c0;background:#e3f2fd;color:#1565c0;font-weight:600">일반반출</span>
        <span style="padding:2px 8px;border-radius:20px;border:1.5px solid #7b1fa2;background:#f3e5f5;color:#7b1fa2;font-weight:600">사내반출</span>
      </div>
      <div class="eq-checklist" id="req-eq-list"></div>
    </div>
    <div id="req-summary" style="font-size:12px;color:#1565c0;margin-top:6px;min-height:18px;"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-request')">취소</button>
      <button class="btn btn-primary" onclick="submitRequest()">신청</button>
    </div>
  </div>
</div>

<!-- PDF 모달 -->
<div class="modal-overlay" id="modal-pdf">
  <div class="modal" style="width:740px;">
    <div class="modal-title">반출 신청서 미리보기</div>
    <div class="pdf-preview" id="pdf-content"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-pdf')">닫기</button>
      <button class="btn btn-pdf" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
    </div>
  </div>
</div>

<!-- 외장하드 프로젝트 모달 -->
<div class="modal-overlay" id="modal-hdd">
  <div class="modal">
    <div class="modal-title">외장하드 프로젝트 연결</div>
    <div class="form-row"><label class="form-label">프로젝트명</label><input type="text" id="hdd-project" placeholder="프로젝트명"></div>
    <div class="form-row"><label class="form-label">외장하드 선택</label><div class="eq-checklist" id="hdd-eq-list"></div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-hdd')">취소</button>
      <button class="btn btn-primary" onclick="submitHdd()">저장</button>
    </div>
  </div>
</div>

<!-- 장비 추가/수정 모달 -->
<div class="modal-overlay" id="modal-equip">
  <div class="modal" style="width:560px;">
    <div class="modal-title" id="equip-modal-title">장비 추가</div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">장비 코드 *</label><input type="text" id="eq-code" placeholder="예) FCAM0001"></div>
      <div class="form-row"><label class="form-label">카테고리 *</label>
        <select id="eq-cat-sel">
          <option>카메라 세트</option><option>카메라</option><option>배터리</option>
          <option>오디오</option><option>SSD</option><option>HDD</option>
          <option>보조배터리</option><option>컴퓨터</option><option>허브</option>
          <option>삼각대</option><option>메모리</option><option>기타</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label class="form-label">장비명 *</label><input type="text" id="eq-name-inp" placeholder="예) DJI Osmo Pocket 3"></div>
    <div class="form-row"><label class="form-label">모델명</label><input type="text" id="eq-model-inp"></div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">수량</label><input type="number" id="eq-qty-inp" value="1" min="1"></div>
      <div class="form-row"><label class="form-label">비고</label><input type="text" id="eq-note-inp" placeholder="(선택)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-equip')">취소</button>
      <button class="btn btn-primary" id="eq-submit-btn" onclick="submitEquip()">추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey:"AIzaSyDufr2BLM54g05ucTpVYi0erwThcsfGj40",
  authDomain:"vdot-equipment.firebaseapp.com",
  projectId:"vdot-equipment",
  storageBucket:"vdot-equipment.firebasestorage.app",
  messagingSenderId:"906683328740",
  appId:"1:906683328740:web:98e020ca29107c43c4e4f1"
});
const db = getFirestore(app);

const TABS=['status','admin','equipment','hdd','backup','history'];
let EQ=[],CO=[],REQUESTS=[],HDD_PROJECTS=[],BACKUPS=[],tab='status',isAdmin=true,editingEqId=null;
let lastRequestCount=null, statusSubTab='all';

// itemTypes: { [eqId]: 'normal' | 'internal' }  — 신청 모달 내 장비별 유형
let itemTypes={};

function today(){return new Date().toISOString().split('T')[0];}
function getEq(id){return EQ.find(e=>e.id===id)||{name:'(삭제된 장비)',cat:'',code:'—'};}
function eqStatus(id){const a=CO.filter(c=>c.items&&c.items.some(i=>i.eqId===id)&&c.status!=='returned');return a.length?a[0].status:'in';}
function getItemType(co,eqId){return(co.items||[]).find(i=>i.eqId===eqId)?.type||co.checkoutType||'normal';}
function getBackup(eqId){return BACKUPS.find(b=>b.eqId===eqId)||{status:'미백업',date:'',manager:'',memo:''};}

function checkOverdue(){
  CO.forEach(c=>{
    if(c.status==='out'){
      // 일반반출 장비가 하나라도 있고 반납일 지났으면 연체
      const hasNormal=(c.items||[]).some(i=>i.type==='normal')||(c.checkoutType==='normal');
      if(hasNormal&&c.returnDate&&c.returnDate<today()) updateDoc(doc(db,'checkouts',c.id),{status:'overdue'});
    }
  });
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function setSyncStatus(on){document.getElementById('sync-dot').className='sync-dot'+(on?'':' off');document.getElementById('sync-label').textContent=on?'실시간 연결됨':'연결 중...';}
function eqTag(id,type){
  const eq=getEq(id);
  const typeBadge=type==='internal'?'<span class="badge badge-internal" style="font-size:10px;padding:1px 6px">사내</span>':'';
  return`<span class="eq-code">${eq.code}</span> <span class="eq-name">${eq.name}</span>${typeBadge}`;
}

// 브라우저 알림
async function requestNotifPermission(){if(!('Notification'in window))return;if(Notification.permission==='default')await Notification.requestPermission();}
function sendNotif(title,body){if(Notification.permission==='granted')new Notification(title,{body});}
function checkNewRequests(newReqs){
  const pending=newReqs.filter(r=>r.status==='pending');
  if(lastRequestCount===null){lastRequestCount=pending.length;return;}
  if(pending.length>lastRequestCount){const n=pending[0];sendNotif('📦 새 반출 신청!',`${n.person} · ${n.project||'프로젝트 미입력'}`);}
  lastRequestCount=pending.length;
}
function renderNotifBar(){
  const wrap=document.getElementById('notif-bar-wrap');
  if(!isAdmin||Notification.permission==='granted'){wrap.innerHTML='';return;}
  wrap.innerHTML=`<div class="notif-bar"><span>🔔 반출 신청 알림을 받으시겠어요?</span><button class="btn btn-sm btn-primary" onclick="requestNotifPermission()">알림 허용</button></div>`;
}

function startListeners(){
  onSnapshot(query(collection(db,'equipments'),orderBy('createdAt','asc')),(snap)=>{EQ=snap.docs.map(d=>({id:d.id,...d.data()}));setSyncStatus(true);render();});
  onSnapshot(query(collection(db,'checkouts'),orderBy('createdAt','desc')),(snap)=>{CO=snap.docs.map(d=>({id:d.id,...d.data()}));checkOverdue();render();});
  onSnapshot(query(collection(db,'requests'),orderBy('createdAt','desc')),(snap)=>{const nr=snap.docs.map(d=>({id:d.id,...d.data()}));checkNewRequests(nr);REQUESTS=nr;render();});
  onSnapshot(collection(db,'hddProjects'),(snap)=>{HDD_PROJECTS=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
  onSnapshot(collection(db,'backups'),(snap)=>{BACKUPS=snap.docs.map(d=>({id:d.id,...d.data()}));render();});
}

function renderStats(){
  const pending=REQUESTS.filter(r=>r.status==='pending').length;
  const activeAll=CO.filter(c=>c.status!=='returned');
  const outNormal=activeAll.filter(c=>(c.items||[]).some(i=>i.type==='normal')||(c.checkoutType==='normal'&&!(c.items||[]).length)).length;
  const outInternal=activeAll.filter(c=>(c.items||[]).every(i=>i.type==='internal')&&(c.items||[]).length>0).length;
  const over=CO.filter(c=>c.status==='overdue').length;
  const ret=CO.filter(c=>c.returnedDate===today()).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">전체 장비</div><div class="stat-value">${EQ.length}</div></div>
    <div class="stat-card"><div class="stat-label">승인 대기</div><div class="stat-value pending">${pending}</div></div>
    <div class="stat-card"><div class="stat-label">반출 중</div><div class="stat-value out">${activeAll.length}</div></div>
    <div class="stat-card"><div class="stat-label">사내 반출 포함</div><div class="stat-value internal">${activeAll.filter(c=>(c.items||[]).some(i=>i.type==='internal')).length}</div></div>
    <div class="stat-card"><div class="stat-label">연체</div><div class="stat-value overdue">${over}</div></div>
    <div class="stat-card"><div class="stat-label">오늘 반납</div><div class="stat-value">${ret}</div></div>`;
  document.getElementById('pending-dot').style.display=pending>0?'':'none';
  document.getElementById('role-display').textContent=isAdmin?'관리자 모드':'직원 모드';
  document.getElementById('tab-btn-admin').style.display=isAdmin?'':'none';
  renderNotifBar();
}

function hasInternal(c){return(c.items||[]).some(i=>i.type==='internal');}
function allInternal(c){return(c.items||[]).length>0&&(c.items||[]).every(i=>i.type==='internal');}

function renderStatus(){
  const active=CO.filter(c=>c.status!=='returned');
  const filtered=statusSubTab==='all'?active
    :statusSubTab==='internal'?active.filter(c=>hasInternal(c))
    :active.filter(c=>!allInternal(c));
  const el=document.getElementById('tab-status');
  let html=`<div class="sub-tab-bar">
    <button class="sub-tab${statusSubTab==='all'?' active':''}" onclick="setStatusSubTab('all')">전체 (${active.length})</button>
    <button class="sub-tab${statusSubTab==='normal'?' active':''}" onclick="setStatusSubTab('normal')">일반 반출 포함 (${active.filter(c=>!allInternal(c)).length})</button>
    <button class="sub-tab${statusSubTab==='internal'?' active':''}" onclick="setStatusSubTab('internal')">사내 반출 포함 (${active.filter(c=>hasInternal(c)).length})</button>
  </div>`;
  if(!filtered.length){el.innerHTML=html+'<div class="empty">반출 중인 장비가 없습니다.</div>';return;}
  html+=`<div class="table-wrap"><table>
    <thead><tr><th>신청자</th><th>프로젝트</th><th>장비 (유형)</th><th>반출일</th><th>예정 반납일</th><th>상태</th><th></th></tr></thead>
    <tbody>${filtered.map(c=>{
      const items=c.items||[];
      const eqList=items.map(i=>`<div class="req-eq-row">${eqTag(i.eqId,i.type)}</div>`).join('');
      const badge=c.status==='overdue'?'<span class="badge badge-overdue">연체</span>':'<span class="badge badge-out">반출 중</span>';
      const internalBadge=hasInternal(c)?'<span class="badge badge-internal" style="font-size:10px;margin-left:4px">사내포함</span>':'';
      return`<tr${hasInternal(c)&&allInternal(c)?' style="background:#fdf6ff"':''}>
        <td><strong>${c.person}</strong></td>
        <td>${c.project||'—'}</td>
        <td style="min-width:220px">${eqList}</td>
        <td>${c.outDate}</td>
        <td>${allInternal(c)?'<span style="color:#aaa;font-size:12px">유연</span>':c.returnDate||'—'}</td>
        <td>${badge}${internalBadge}</td>
        <td>${isAdmin?`<div style="display:flex;gap:6px;"><button class="btn btn-sm btn-pdf" onclick="showPdf('${c.id}')">PDF</button><button class="btn btn-sm btn-success" onclick="returnAll('${c.id}')">반납</button></div>`:'—'}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
  el.innerHTML=html;
}

window.setStatusSubTab=function(t){statusSubTab=t;renderStatus();};

function renderHdd(){
  const hddEqs=EQ.filter(e=>e.cat==='SSD'||e.cat==='HDD');
  const usedIds=HDD_PROJECTS.flatMap(p=>p.equipIds||[]);
  const unused=hddEqs.filter(e=>!usedIds.includes(e.id));
  function bkClass(id){const bk=getBackup(id);return bk.status==='백업 완료'?'backed':bk.status==='백업 중'?'backing':'';}
  function bkBadge(id){const bk=getBackup(id);return bk.status==='백업 완료'?'<span class="badge badge-backup-done" style="font-size:10px;margin-left:4px">백업완료</span>':bk.status==='백업 중'?'<span class="badge badge-backup" style="font-size:10px;margin-left:4px">백업중</span>':bk.status==='미백업'?'<span class="badge" style="font-size:10px;margin-left:4px;background:#fff3e0;color:#e65100">미백업</span>':'';}
  let html=`<div class="section-header"><span class="section-title">프로젝트별 외장하드</span>${isAdmin?`<button class="btn btn-sm btn-primary" onclick="openHdd()">+ 프로젝트 연결</button>`:''}</div>`;
  html+=HDD_PROJECTS.length?HDD_PROJECTS.map(p=>{
    const eqs=(p.equipIds||[]).map(id=>getEq(id));
    return`<div class="hdd-card"><div class="hdd-project-title"><span>${p.project}</span>${isAdmin?`<button class="btn btn-sm btn-danger" onclick="deleteHddProject('${p.id}')">삭제</button>`:''}</div>
      <div class="hdd-chips">${eqs.map(e=>`<span class="hdd-chip ${bkClass(e.id)}"><span class="eq-code" style="font-size:11px">${e.code}</span><span class="eq-name" style="font-size:12px">${e.name}</span>${bkBadge(e.id)}</span>`).join('')}</div>
    </div>`;
  }).join(''):'<div class="empty" style="margin-bottom:1rem">연결된 프로젝트가 없습니다.</div>';
  html+=`<div class="section-header" style="margin-top:1.5rem"><span class="section-title">미배정 외장하드 (${unused.length}개)</span></div>`;
  html+=unused.length?`<div class="table-wrap"><table>
    <thead><tr><th>코드</th><th>장비명</th><th>종류</th><th>백업 상태</th><th>상태</th></tr></thead>
    <tbody>${unused.map(e=>{
      const bk=getBackup(e.id);
      const activeC=CO.find(c=>c.status!=='returned'&&(c.items||[]).some(i=>i.eqId===e.id));
      const itemType=activeC?(activeC.items||[]).find(i=>i.eqId===e.id)?.type:null;
      const stBadge=!activeC?'<span class="badge badge-in">보유 중</span>':itemType==='internal'?'<span class="badge badge-internal">사내 반출</span>':'<span class="badge badge-out">반출 중</span>';
      const bkB=bk.status==='백업 완료'?'<span class="badge badge-backup-done">백업완료</span>':bk.status==='백업 중'?'<span class="badge badge-backup">백업중</span>':'<span style="color:#bbb;font-size:12px">—</span>';
      return`<tr><td><span class="eq-code">${e.code}</span></td><td><span class="eq-name">${e.name}</span></td><td><span class="cat-badge">${e.cat}</span></td><td>${bkB}</td><td>${stBadge}</td></tr>`;
    }).join('')}</tbody></table></div>`:'<div class="empty">모든 외장하드가 프로젝트에 배정되어 있습니다.</div>';
  document.getElementById('tab-hdd').innerHTML=html;
}

          <td>${isAdmin?`<input type="date" value="${bk.date||''}" onchange="updateBackup('${e.id}','date',this.value)" style="width:130px;font-size:12px;padding:4px 8px;">`:(bk.date||'—')}</td>

  renderStats();

window.openRequest=function(){
  ['req-person','req-project','req-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('req-out').value=today();
  document.getElementById('req-ret').value='';
  document.getElementById('req-approver').value='김종원';
  document.getElementById('req-search').value='';
  itemTypes={};
  const cats=[...new Set(EQ.map(e=>e.cat))];
  document.getElementById('req-cat-f').innerHTML='<option value="">전체</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  buildReqList('','');
  document.getElementById('modal-request').classList.add('open');
};

function buildReqList(search,cat){
  const filtered=EQ.filter(e=>(!cat||e.cat===cat)&&(!search||e.name.toLowerCase().includes(search)||e.code.toLowerCase().includes(search)));
  document.getElementById('req-eq-list').innerHTML=filtered.map(e=>{
    const isOut=eqStatus(e.id)!=='in';
    const checked=itemTypes[e.id]!==undefined;
    const curType=itemTypes[e.id]||'normal';
    return`<div class="eq-check-item${isOut?' disabled':''}${checked?' checked':''}" id="item-row-${e.id}">
      <input type="checkbox" data-eq="${e.id}" ${isOut?'disabled':''} ${checked?'checked':''} onchange="toggleEqItem('${e.id}',this.checked)">
      <div class="eq-check-info">
        <div class="eq-check-name"><span class="eq-code">${e.code}</span> <span class="eq-name">${e.name}</span></div>
        <div class="eq-check-sub">${e.cat}${e.note?' · '+e.note:''}</div>
      </div>
      <div class="item-type-toggle" id="toggle-${e.id}">
        <button class="type-pill normal${curType==='normal'?' active':''}" onclick="setItemType('${e.id}','normal')">일반반출</button>
        <button class="type-pill internal${curType==='internal'?' active':''}" onclick="setItemType('${e.id}','internal')">사내반출</button>
      </div>
      ${isOut?'<span class="badge badge-out" style="font-size:10px;white-space:nowrap">반출 중</span>':''}
    </div>`;
  }).join('');
  updateReqSummary();
}

window.toggleEqItem=function(eqId,checked){
  const row=document.getElementById('item-row-'+eqId);
  if(checked){itemTypes[eqId]='normal';row.classList.add('checked');}
  else{delete itemTypes[eqId];row.classList.remove('checked');}
  updateReqSummary();
};

window.setItemType=function(eqId,type){
  itemTypes[eqId]=type;
  const toggle=document.getElementById('toggle-'+eqId);
  if(toggle){
    toggle.querySelectorAll('.type-pill').forEach(p=>p.classList.remove('active'));
    toggle.querySelector('.type-pill.'+type)?.classList.add('active');
  }
  updateReqSummary();
};

    const isOut=eqStatus(e.id)!=='in';

    return`<div class="eq-check-item${isOut?' disabled':''}${checked?' checked':''}" id="item-row-${e.id}">
      <input type="checkbox" data-eq="${e.id}" ${isOut?'disabled':''} ${checked?'checked':''} onchange="toggleEqItem('${e.id}',this.checked)">
      <div class="eq-check-info">
        <div class="eq-check-name"><span class="eq-code">${e.code}</span> <span class="eq-name">${e.name}</span></div>
        <div class="eq-check-sub">${e.cat}${e.note?' · '+e.note:''}</div>
      </div>
      <div class="item-type-toggle" id="toggle-${e.id}">
        <button class="type-pill normal${curType==='normal'?' active':''}" onclick="setItemType('${e.id}','normal')">일반반출</button>
        <button class="type-pill internal${curType==='internal'?' active':''}" onclick="setItemType('${e.id}','internal')">사내반출</button>
      </div>
      ${isOut?'<span class="badge badge-out" style="font-size:10px;white-space:nowrap">반출 중</span>':''}
    </div>`;
  }).join('');
  updateReqSummary();
};

window.updateReqSummary=function(){
  const keys=Object.keys(itemTypes);
  const normal=keys.filter(k=>itemTypes[k]==='normal').length;
  const internal=keys.filter(k=>itemTypes[k]==='internal').length;
  let msg='';
  if(keys.length) msg=`${keys.length}개 선택 (일반 ${normal}개 · 사내 ${internal}개)`;
  document.getElementById('req-summary').textContent=msg;
};

window.closeModal=function(id){document.getElementById(id).classList.remove('open');};
window.requestNotifPermission=requestNotifPermission;

window.submitRequest=async function(){
  const person=document.getElementById('req-person').value.trim();
  const project=document.getElementById('req-project').value.trim();
  const outDate=document.getElementById('req-out').value;
  const returnDate=document.getElementById('req-ret').value;
  const approver=document.getElementById('req-approver').value;
  const items=Object.entries(itemTypes).map(([eqId,type])=>({eqId,type}));
  if(!person||!outDate){alert('신청자와 반출일을 입력해주세요.');return;}
  const hasNormal=items.some(i=>i.type==='normal');
  if(hasNormal&&!returnDate){alert('일반 반출 장비가 있으면 예정 반납일을 입력해주세요.');return;}
  if(!items.length){alert('장비를 1개 이상 선택해주세요.');return;}
  const now=new Date();
  const createdAtStr=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  await addDoc(collection(db,'requests'),{person,project,outDate,returnDate:hasNormal?returnDate:'',approver,items,note:document.getElementById('req-note').value.trim(),status:'pending',createdAt:Date.now(),createdAtStr});
  showToast('반출 신청 완료! 승인을 기다려주세요.');
  closeModal('modal-request');
};

window.approveRequest=async function(id){
  const r=REQUESTS.find(x=>x.id===id);if(!r)return;
  await updateDoc(doc(db,'requests',id),{status:'approved'});
  const hasNormal=(r.items||[]).some(i=>i.type==='normal');
  await addDoc(collection(db,'checkouts'),{person:r.person,project:r.project,items:r.items||[],outDate:r.outDate,returnDate:r.returnDate||'',approver:r.approver,note:r.note,status:'out',returnedDate:'',createdAt:Date.now()});
  showToast('승인 완료');
};

window.rejectRequest=async function(id){
  if(!confirm('신청을 반려하시겠습니까?'))return;
  await updateDoc(doc(db,'requests',id),{status:'rejected'});showToast('반려 처리됨');
};

window.returnAll=async function(id){
  if(!confirm('반납 처리하시겠습니까?'))return;
  await updateDoc(doc(db,'checkouts',id),{status:'returned',returnedDate:today()});showToast('반납 처리 완료');
};

window.showPdf=function(id){
  const c=CO.find(x=>x.id===id);if(!c)return;
  const items=c.items||[];
  const normalItems=items.filter(i=>i.type==='normal');
  const internalItems=items.filter(i=>i.type==='internal');
  function rows(arr,label){
    return arr.map((i,idx)=>{const e=getEq(i.eqId);return`<tr><td>${idx+1}</td><td>${e.code}</td><td>${e.cat}</td><td>${e.name}</td><td>${label}</td><td>1</td><td></td></tr>`;}).join('');
  }
  document.getElementById('pdf-content').innerHTML=`
    <h2>(주)브이닷 장비 반출 신청서</h2>
    <div class="meta">
      <div class="meta-item"><span class="meta-label">신청자</span><strong>${c.person}</strong></div>
      <div class="meta-item"><span class="meta-label">프로젝트</span><strong>${c.project||'—'}</strong></div>
      <div class="meta-item"><span class="meta-label">반출일</span><strong>${c.outDate}</strong></div>
      ${normalItems.length?`<div class="meta-item"><span class="meta-label">예정 반납일</span><strong>${c.returnDate}</strong></div>`:''}
      ${c.note?`<div class="meta-item" style="grid-column:span 2"><span class="meta-label">메모</span>${c.note}</div>`:''}
    </div>
    <table><thead><tr><th>NO</th><th>코드</th><th>분류</th><th>장비명</th><th>유형</th><th>수량</th><th>확인</th></tr></thead>
    <tbody>${rows(normalItems,'일반반출')}${rows(internalItems,'사내반출')}</tbody></table>
    <div class="sign-area">
      <div class="sign-box"><div class="sign-label">신청자</div><div class="sign-name">${c.person}</div></div>
      <div class="sign-box"><div class="sign-label">승인자</div><div class="sign-name">${c.approver||'—'}</div></div>
      <div class="sign-box"><div class="sign-label">반납 확인</div><div class="sign-name"></div></div>
    </div>`;
  document.getElementById('modal-pdf').classList.add('open');
};

window.openEquipModal=function(id){
  editingEqId=id||null;
  document.getElementById('equip-modal-title').textContent=id?'장비 수정':'장비 추가';
  document.getElementById('eq-submit-btn').textContent=id?'저장':'추가';
  if(id){const e=getEq(id);document.getElementById('eq-code').value=e.code||'';document.getElementById('eq-cat-sel').value=e.cat||'기타';document.getElementById('eq-name-inp').value=e.name||'';document.getElementById('eq-model-inp').value=e.model||'';document.getElementById('eq-qty-inp').value=e.qty||1;document.getElementById('eq-note-inp').value=e.note||'';}
  else{['eq-code','eq-name-inp','eq-model-inp','eq-note-inp'].forEach(i=>document.getElementById(i).value='');document.getElementById('eq-qty-inp').value=1;}
  document.getElementById('modal-equip').classList.add('open');
};
window.submitEquip=async function(){
  const code=document.getElementById('eq-code').value.trim();
  const name=document.getElementById('eq-name-inp').value.trim();
  if(!code||!name){alert('장비 코드와 장비명을 입력해주세요.');return;}
  const data={code,cat:document.getElementById('eq-cat-sel').value,name,model:document.getElementById('eq-model-inp').value.trim(),qty:parseInt(document.getElementById('eq-qty-inp').value)||1,note:document.getElementById('eq-note-inp').value.trim()};
  if(editingEqId){await updateDoc(doc(db,'equipments',editingEqId),data);showToast('장비 수정 완료');}
  else{await addDoc(collection(db,'equipments'),{...data,createdAt:Date.now()});showToast('장비 추가 완료');}
  closeModal('modal-equip');
};
window.deleteEquip=async function(id){
  if(!confirm(`"${getEq(id).name}" 장비를 삭제하시겠습니까?`))return;
  await deleteDoc(doc(db,'equipments',id));showToast('삭제 완료');
};
window.openHdd=function(){
  document.getElementById('hdd-project').value='';
  const hddEqs=EQ.filter(e=>e.cat==='SSD'||e.cat==='HDD');
  const usedIds=HDD_PROJECTS.flatMap(p=>p.equipIds||[]);
  document.getElementById('hdd-eq-list').innerHTML=hddEqs.map(e=>{
    const used=usedIds.includes(e.id);
    return`<label class="eq-check-item${used?' disabled':''}"><input type="checkbox" data-eq="${e.id}" ${used?'disabled':''}><div style="flex:1"><div><span class="eq-code">${e.code}</span> <span class="eq-name">${e.name}</span></div><div style="font-size:11px;color:#888">${e.cat}</div></div>${used?'<span style="font-size:11px;color:#bbb">배정됨</span>':''}</label>`;
  }).join('');
  document.getElementById('modal-hdd').classList.add('open');
};
window.submitHdd=async function(){
  const project=document.getElementById('hdd-project').value.trim();
  if(!project){alert('프로젝트명을 입력해주세요.');return;}
  const equipIds=[...document.querySelectorAll('#hdd-eq-list input:checked')].map(i=>i.dataset.eq);
  if(!equipIds.length){alert('외장하드를 1개 이상 선택해주세요.');return;}
  await addDoc(collection(db,'hddProjects'),{project,equipIds,createdAt:Date.now()});
  showToast('프로젝트 연결 완료');closeModal('modal-hdd');
};
window.deleteHddProject=async function(id){
  if(!confirm('이 프로젝트 연결을 삭제하시겠습니까?'))return;
  await deleteDoc(doc(db,'hddProjects',id));showToast('삭제 완료');
};
window.updateBackup=async function(eqId,field,value){
  const bk=BACKUPS.find(b=>b.eqId===eqId);
  if(bk) await updateDoc(doc(db,'backups',bk.id),{[field]:value});
  else await addDoc(collection(db,'backups'),{eqId,status:'미백업',date:'',manager:'',memo:'',[field]:value});
};

startListeners();
requestNotifPermission();
</script>
</body>
