<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDOT 장비 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;}
.app{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;}
.brand{font-size:12px;font-weight:600;color:#888;letter-spacing:.1em;}
.title{font-size:22px;font-weight:600;}
.header-right{display:flex;align-items:center;gap:10px;}
.role-badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;background:#1a1a1a;color:#fff;cursor:pointer;border:none;font-family:inherit;}
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:2rem;}
.stat-card{background:#fff;border-radius:10px;padding:14px 18px;border:1px solid #e8e8e8;}
.stat-label{font-size:11px;color:#888;margin-bottom:5px;font-weight:500;}
.stat-value{font-size:22px;font-weight:600;}
.stat-value.pending{color:#e67e22;}
.stat-value.out{color:#1a6fb8;}
.stat-value.overdue{color:#c0392b;}
.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid #e0e0e0;overflow-x:auto;}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600;}
.tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#e67e22;margin-left:5px;vertical-align:middle;}
.btn{padding:8px 16px;font-size:13px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit;font-weight:500;}
.btn:hover{background:#f5f5f5;}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btn-primary:hover{background:#333;}
.btn-success{background:#27ae60;color:#fff;border-color:#27ae60;}
.btn-success:hover{background:#219a52;}
.btn-danger{border-color:#e0b0b0;color:#c0392b;}
.btn-danger:hover{background:#fff0f0;}
.btn-pdf{background:#8e44ad;color:#fff;border-color:#8e44ad;}
.btn-pdf:hover{background:#7d3c98;}
.btn-sm{padding:5px 11px;font-size:12px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-size:13px;font-weight:600;color:#888;}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;}
.filter-bar input{flex:1;min-width:150px;}
.table-wrap{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#fafafa;padding:9px 14px;text-align:left;font-weight:600;font-size:11px;color:#888;border-bottom:1px solid #e8e8e8;white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid #f0f0f0;color:#1a1a1a;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-in{background:#e8f5e9;color:#2e7d32;}
.badge-out{background:#e3f2fd;color:#1565c0;}
.badge-overdue{background:#ffebee;color:#c62828;}
.badge-pending{background:#fff3e0;color:#e65100;}
.badge-rejected{background:#f5f5f5;color:#888;}
.badge-done{background:#f3e5f5;color:#6a1b9a;}
.badge-backup{background:#e8f5e9;color:#2e7d32;}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;background:#f0f0f0;color:#555;}
/* 장비 코드/이름 색상 구분 */
.eq-code{font-family:monospace;font-size:12px;color:#1565c0;background:#e3f2fd;padding:2px 7px;border-radius:4px;font-weight:600;}
.eq-name{font-size:13px;color:#2e7d32;font-weight:500;}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:14px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-start;justify-content:center;padding-top:3vh;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:1.75rem;width:660px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.15);margin-bottom:3vh;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:1.25rem;}
.form-row{margin-bottom:14px;}
.form-label{font-size:12px;color:#888;margin-bottom:5px;display:block;font-weight:500;}
input[type=text],input[type=date],input[type=number],select,textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#1a1a1a;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1.5rem;position:sticky;bottom:0;background:#fff;padding-top:12px;border-top:1px solid #f0f0f0;}
.eq-checklist{max-height:300px;overflow-y:auto;border:1px solid #e8e8e8;border-radius:8px;}
.eq-check-item{display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer;}
.eq-check-item:last-child{border-bottom:none;}
.eq-check-item:hover{background:#fafafa;}
.eq-check-item.disabled{opacity:.45;cursor:not-allowed;background:#fafafa;}
.eq-check-item input[type=checkbox]{width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:#1a1a1a;}
.eq-check-item.disabled input[type=checkbox]{cursor:not-allowed;}
.eq-check-info{flex:1;}
.eq-check-name{font-size:13px;}
.eq-check-sub{font-size:11px;color:#888;margin-top:2px;}
/* 신청 목록 내 장비 표시 */
.req-eq-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.hdd-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem 1.25rem;margin-bottom:12px;}
.hdd-project{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.hdd-list{display:flex;flex-wrap:wrap;gap:6px;}
.hdd-chip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb;}
/* 백업 현황 */
.backup-table select{width:auto;padding:5px 8px;font-size:12px;}
.backup-status-done{color:#27ae60;font-weight:600;}
.backup-status-partial{color:#e67e22;font-weight:600;}
.backup-status-none{color:#c0392b;font-weight:600;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
/* PDF */
.pdf-preview{background:#fff;border:1px solid #ddd;border-radius:8px;padding:2rem;font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;}
.pdf-preview h2{text-align:center;font-size:18px;margin-bottom:1rem;border-bottom:2px solid #1a1a1a;padding-bottom:.5rem;}
.pdf-preview .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;font-size:13px;}
.pdf-preview .meta-item{display:flex;gap:8px;}
.pdf-preview .meta-label{color:#888;min-width:70px;}
.pdf-preview table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem;}
.pdf-preview th{background:#f5f5f5;padding:8px;border:1px solid #ddd;text-align:center;font-size:12px;}
.pdf-preview td{padding:8px;border:1px solid #ddd;text-align:center;}
.pdf-preview .sign-area{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1.5rem;}
.pdf-preview .sign-box{border:1px solid #ddd;border-radius:6px;padding:12px;text-align:center;}
.pdf-preview .sign-label{font-size:11px;color:#888;margin-bottom:20px;}
.pdf-preview .sign-name{font-size:13px;font-weight:600;}
@media print{
  body{background:#fff;}
  .app,.tab-bar,.stats-grid,.header{display:none !important;}
  .modal-overlay{position:static !important;background:none !important;display:block !important;padding:0;}
  .modal{box-shadow:none !important;max-height:none !important;width:100% !important;padding:0 !important;border-radius:0 !important;}
  .modal-footer,.modal-title{display:none !important;}
  #modal-pdf{display:block !important;}
}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}.form-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="brand">VDOT</div>
      <div class="title">장비 관리</div>
    </div>
    <div class="header-right">
      <button class="role-badge" onclick="toggleRole()" id="role-display">관리자 모드</button>
      <button class="btn btn-primary" onclick="openRequest()">+ 반출 신청</button>
    </div>
  </div>
  <div class="stats-grid" id="stats"></div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('status',this)">반출 현황</button>
    <button class="tab" id="tab-btn-admin" onclick="switchTab('admin',this)">신청 관리 <span class="dot" id="pending-dot" style="display:none"></span></button>
    <button class="tab" onclick="switchTab('equipment',this)">장비 목록</button>
    <button class="tab" onclick="switchTab('hdd',this)">외장하드</button>
    <button class="tab" onclick="switchTab('backup',this)">백업 현황</button>
    <button class="tab" onclick="switchTab('history',this)">반출 이력</button>
  </div>
  <div id="tab-status"></div>
  <div id="tab-admin" style="display:none"></div>
  <div id="tab-equipment" style="display:none"></div>
  <div id="tab-hdd" style="display:none"></div>
  <div id="tab-backup" style="display:none"></div>
  <div id="tab-history" style="display:none"></div>
</div>

<!-- 반출 신청 모달 -->
<div class="modal-overlay" id="modal-request">
  <div class="modal">
    <div class="modal-title">반출 신청</div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">신청자</label><input type="text" id="req-person" placeholder="이름"></div>
      <div class="form-row"><label class="form-label">프로젝트</label><input type="text" id="req-project" placeholder="프로젝트명"></div>
    </div>
    <div class="form-grid">
      <div class="form-row"><label class="form-label">반출일</label><input type="date" id="req-out"></div>
      <div class="form-row"><label class="form-label">예정 반납일</label><input type="date" id="req-ret"></div>
    </div>
    <div class="form-row"><label class="form-label">메모</label><input type="text" id="req-note" placeholder="(선택)"></div>
    <div class="form-row">
      <label class="form-label">장비 선택 <span style="color:#aaa;font-weight:400">(반출 중 장비도 확인 가능, 선택 불가)</span></label>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <input type="text" id="req-search" placeholder="장비명 또는 코드 검색" oninput="filterReqList()" style="flex:1;">
        <select id="req-cat-filter" onchange="filterReqList()" style="width:auto;min-width:100px;"></select>
      </div>
      <div class="eq-checklist" id="req-eq-list"></div>
    </div>
    <div id="req-selected-summary" style="font-size:12px;color:#1565c0;margin-top:6px;min-height:18px;"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-request')">취소</button>
      <button class="btn btn-primary" onclick="submitRequest()">신청</button>
    </div>
  </div>
</div>

<!-- PDF 미리보기 모달 -->
<div class="modal-overlay" id="modal-pdf">
  <div class="modal" style="width:740px;">
    <div class="modal-title">반출 신청서 미리보기</div>
    <div class="pdf-preview" id="pdf-content"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-pdf')">닫기</button>
      <button class="btn btn-pdf" onclick="window.print()">🖨 인쇄 / PDF 저장</button>
    </div>
  </div>
</div>

<!-- 외장하드 프로젝트 연결 모달 -->
<div class="modal-overlay" id="modal-hdd">
  <div class="modal">
    <div class="modal-title">외장하드 프로젝트 연결</div>
    <div class="form-row"><label class="form-label">프로젝트명</label><input type="text" id="hdd-project" placeholder="프로젝트명"></div>
    <div class="form-row">
      <label class="form-label">외장하드 선택</label>
      <div class="eq-checklist" id="hdd-eq-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-hdd')">취소</button>
      <button class="btn btn-primary" onclick="submitHdd()">저장</button>
    </div>
  </div>
</div>

<!-- 승인자 설정 모달 -->
<div class="modal-overlay" id="modal-approver">
  <div class="modal" style="width:400px;">
    <div class="modal-title">승인자 설정</div>
    <div class="form-row">
      <label class="form-label">승인자 선택</label>
      <select id="approver-select">
        <option value="김종원">김종원</option>
        <option value="양수빈">양수빈</option>
        <option value="이상협">이상협</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-approver')">취소</button>
      <button class="btn btn-primary" onclick="saveApprover()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let EQ=[],CO=[],REQUESTS=[],HDD_PROJECTS=[],BACKUPS=[],tab='status',isAdmin=true,approver='김종원';
const TABS=['status','admin','equipment','hdd','backup','history'];

function today(){return new Date().toISOString().split('T')[0];}
function getEq(id){return EQ.find(e=>e.id===id)||{name:'(삭제된 장비)',cat:'',code:'—'};}
function eqStatus(id){const a=CO.filter(c=>c.equipIds&&c.equipIds.includes(id)&&c.status!=='returned');return a.length?a[0].status:'in';}
function checkOverdue(){CO.forEach(c=>{if(c.status==='out'&&c.returnDate<today())c.status='overdue';});}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function lsGet(k,def){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):def;}catch{return def;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

function loadData(){
  EQ=lsGet('vdot_eq_v5',null);
  if(!EQ){EQ=[...DEFAULT_EQ];lsSet('vdot_eq_v5',EQ);}
  CO=lsGet('vdot_co_v5',[]);
  REQUESTS=lsGet('vdot_req_v5',[]);
  HDD_PROJECTS=lsGet('vdot_hdd_v5',[]);
  BACKUPS=lsGet('vdot_backup_v5',[]);
  isAdmin=lsGet('vdot_role_v5',true);
  approver=lsGet('vdot_approver_v5','김종원');
}
function saveAll(){
  lsSet('vdot_eq_v5',EQ);lsSet('vdot_co_v5',CO);lsSet('vdot_req_v5',REQUESTS);
  lsSet('vdot_hdd_v5',HDD_PROJECTS);lsSet('vdot_backup_v5',BACKUPS);
  lsSet('vdot_role_v5',isAdmin);lsSet('vdot_approver_v5',approver);
}

function toggleRole(){isAdmin=!isAdmin;saveAll();render();}

// 장비 코드/이름 컬러 표시 헬퍼
function eqTag(id){
  const eq=getEq(id);
  return`<span class="eq-code">${eq.code}</span> <span class="eq-name">${eq.name}</span>`;
}

function renderStats(){
  const pending=REQUESTS.filter(r=>r.status==='pending').length;
  const out=CO.filter(c=>c.status==='out').length;
  const over=CO.filter(c=>c.status==='overdue').length;
  const ret=CO.filter(c=>c.returnedDate===today()).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">전체 장비</div><div class="stat-value">${EQ.length}</div></div>
    <div class="stat-card"><div class="stat-label">승인 대기</div><div class="stat-value pending">${pending}</div></div>
    <div class="stat-card"><div class="stat-label">반출 중</div><div class="stat-value out">${out}</div></div>
    <div class="stat-card"><div class="stat-label">연체</div><div class="stat-value overdue">${over}</div></div>
    <div class="stat-card"><div class="stat-label">오늘 반납</div><div class="stat-value">${ret}</div></div>`;
  const dot=document.getElementById('pending-dot');
  if(dot)dot.style.display=pending>0?'':'none';
  document.getElementById('role-display').textContent=isAdmin?'관리자 모드':'직원 모드';
  document.getElementById('tab-btn-admin').style.display=isAdmin?'':'none';
}

function renderStatus(){
  const active=CO.filter(c=>c.status!=='returned');
  const el=document.getElementById('tab-status');
  if(!active.length){el.innerHTML='<div class="empty">현재 반출 중인 장비가 없습니다.</div>';return;}
  el.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>신청자</th><th>프로젝트</th><th>장비 목록</th><th>반출일</th><th>예정 반납일</th><th>상태</th><th></th></tr></thead>
    <tbody>${active.map(c=>{
      const badge=c.status==='overdue'?'<span class="badge badge-overdue">연체</span>':'<span class="badge badge-out">반출 중</span>';
      const eqList=(c.equipIds||[]).map(id=>`<div class="req-eq-row">${eqTag(id)}</div>`).join('');
      return`<tr>
        <td><strong>${c.person}</strong></td>
        <td>${c.project||'—'}</td>
        <td style="min-width:220px">${eqList}</td>
        <td>${c.outDate}</td><td>${c.returnDate}</td>
        <td>${badge}</td>
        <td>${isAdmin?`<div style="display:flex;gap:6px;"><button class="btn btn-sm btn-pdf" onclick="showPdf('${c.id}')">PDF</button><button class="btn btn-sm btn-success" onclick="returnAll('${c.id}')">반납</button></div>`:'—'}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function renderAdmin(){

  let html=`<div class="section-header">
    <span class="section-title">승인 대기 ${pending.length}건</span>
    <button class="btn btn-sm" onclick="openApproverModal()">승인자: ${approver} ✎</button>

  else html+=`<div class="table-wrap" style="margin-bottom:1.5rem"><table>
    <thead><tr><th>신청일시</th><th>신청자</th><th>프로젝트</th><th>장비</th><th>반출일</th><th>반납일</th><th>메모</th><th></th></tr></thead>
    <tbody>${pending.map(r=>{
      const eqList=(r.equipIds||[]).map(id=>`<div class="req-eq-row">${eqTag(id)}</div>`).join('');
      return`<tr>
        <td style="font-size:11px;color:#888;white-space:nowrap">${r.createdAt||''}</td>
        <td><strong>${r.person}</strong></td>
        <td>${r.project||'—'}</td>
        <td style="min-width:220px">${eqList}</td>
        <td>${r.outDate}</td><td>${r.returnDate}</td>
        <td style="font-size:12px;color:#888">${r.note||'—'}</td>
        <td><div style="display:flex;gap:6px;"><button class="btn btn-sm btn-success" onclick="approveRequest('${r.id}')">승인</button><button class="btn btn-sm btn-danger" onclick="rejectRequest('${r.id}')">반려</button></div></td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
  html+=`<div class="section-header"><span class="section-title">처리 완료</span></div>`;
  if(!done.length)html+='<div class="empty">처리된 신청이 없습니다.</div>';
  else html+=`<div class="table-wrap"><table>
    <thead><tr><th>신청자</th><th>프로젝트</th><th>장비 수</th><th>반출일</th><th>결과</th></tr></thead>
    <tbody>${done.map(r=>`<tr>
      <td>${r.person}</td><td>${r.project||'—'}</td>
      <td>${(r.equipIds||[]).length}개</td><td>${r.outDate}</td>
      <td>${r.status==='approved'?'<span class="badge badge-in">승인</span>':'<span class="badge badge-rejected">반려</span>'}</td>
    </tr>`).join('')}</tbody></table></div>`;

function renderEquipment(){
  const cats=[...new Set(EQ.map(e=>e.cat))];
  const catF=document.getElementById('eq-cat-f2')?document.getElementById('eq-cat-f2').value:'전체';
  const srch=document.getElementById('eq-srch2')?document.getElementById('eq-srch2').value.toLowerCase():'';

    <div class="filter-bar">

      <thead><tr><th>코드</th><th>장비명</th><th>카테고리</th><th>수량</th><th>비고</th><th>상태</th></tr></thead>
      <tbody>${filtered.map(e=>{
        const st=eqStatus(e.id);

function renderHdd(){
  const hddEqs=EQ.filter(e=>e.cat==='SSD'||e.cat==='HDD');
  const usedIds=HDD_PROJECTS.flatMap(p=>p.equipIds||[]);
  const unused=hddEqs.filter(e=>!usedIds.includes(e.id));
  let html=`<div class="section-header">
    <span class="section-title">프로젝트별 외장하드 현황</span>
    ${isAdmin?`<button class="btn btn-sm btn-primary" onclick="openHdd()">+ 프로젝트 연결</button>`:''}
  </div>`;
  if(HDD_PROJECTS.length){
    html+=HDD_PROJECTS.map(p=>{
      const eqs=(p.equipIds||[]).map(id=>getEq(id));
      return`<div class="hdd-card">
        <div class="hdd-project"><span>${p.project}</span>
          ${isAdmin?`<button class="btn btn-sm btn-danger" onclick="deleteHddProject('${p.id}')">삭제</button>`:''}
        </div>
        <div class="hdd-list">${eqs.map(e=>`<span class="hdd-chip"><span class="eq-code" style="font-size:11px">${e.code}</span> <span class="eq-name" style="font-size:12px">${e.name}</span></span>`).join('')}</div>
      </div>`;

  }else html+='<div class="empty" style="margin-bottom:1rem">연결된 프로젝트가 없습니다.</div>';
  html+=`<div class="section-header" style="margin-top:1.5rem"><span class="section-title">미배정 외장하드 (${unused.length}개)</span></div>`;
  if(unused.length){
    html+=`<div class="table-wrap"><table>
      <thead><tr><th>코드</th><th>장비명</th><th>종류</th><th>상태</th></tr></thead>
      <tbody>${unused.map(e=>{
        const st=eqStatus(e.id);
        const badge=st==='out'?'<span class="badge badge-out">반출 중</span>':'<span class="badge badge-in">보유 중</span>';
        return`<tr><td><span class="eq-code">${e.code}</span></td><td><span class="eq-name">${e.name}</span></td><td><span class="cat-badge">${e.cat}</span></td><td>${badge}</td></tr>`;
      }).join('')}</tbody></table></div>`;
  }else html+='<div class="empty">모든 외장하드가 프로젝트에 배정되어 있습니다.</div>';
  document.getElementById('tab-hdd').innerHTML=html;

function renderBackup(){
  const hddEqs=EQ.filter(e=>e.cat==='SSD'||e.cat==='HDD');
  const statusOpts=['백업 완료','백업 중','미백업','해당없음'];
  const statusClass={'백업 완료':'backup-status-done','백업 중':'backup-status-partial','미백업':'backup-status-none','해당없음':''};
  let html=`<div class="section-header"><span class="section-title">외장하드 백업 현황 (${hddEqs.length}개)</span></div>
  <div class="table-wrap backup-table"><table>
    <thead><tr><th>코드</th><th>장비명</th><th>종류</th><th>프로젝트</th><th>백업 상태</th><th>백업 날짜</th><th>메모</th></tr></thead>
    <tbody>${hddEqs.map(e=>{
      const proj=HDD_PROJECTS.find(p=>(p.equipIds||[]).includes(e.id));
      const bk=BACKUPS.find(b=>b.eqId===e.id)||{status:'해당없음',date:'',memo:''};
      const sc=statusClass[bk.status]||'';
      return`<tr>
        <td><span class="eq-code">${e.code}</span></td>
        <td><span class="eq-name">${e.name}</span></td>
        <td><span class="cat-badge">${e.cat}</span></td>
        <td>${proj?proj.project:'<span style="color:#aaa">미배정</span>'}</td>
        <td>${isAdmin
          ?`<select onchange="updateBackup('${e.id}','status',this.value)" style="width:auto;font-size:12px;padding:4px 8px;">${statusOpts.map(s=>`<option${bk.status===s?' selected':''}>${s}</option>`).join('')}</select>`
          :`<span class="${sc}">${bk.status}</span>`}
        </td>
        <td>${isAdmin
          ?`<input type="date" value="${bk.date}" onchange="updateBackup('${e.id}','date',this.value)" style="width:130px;font-size:12px;padding:4px 8px;">`
          :(bk.date||'—')}
        </td>
        <td>${isAdmin
          ?`<input type="text" value="${bk.memo||''}" placeholder="메모" onchange="updateBackup('${e.id}','memo',this.value)" style="font-size:12px;padding:4px 8px;">`
          :(bk.memo||'—')}
        </td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
  document.getElementById('tab-backup').innerHTML=html;
}

function updateBackup(eqId,field,value){
  let bk=BACKUPS.find(b=>b.eqId===eqId);
  if(!bk){bk={eqId,status:'해당없음',date:'',memo:''};BACKUPS.push(bk);}
  bk[field]=value;
  saveAll();
}

function renderHistory(){
  const returned=CO.filter(c=>c.status==='returned').sort((a,b)=>(b.returnedDate||'').localeCompare(a.returnedDate||''));
  document.getElementById('tab-history').innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>신청자</th><th>프로젝트</th><th>장비</th><th>반출일</th><th>반납일</th><th>메모</th></tr></thead>
    <tbody>${returned.length===0?`<tr><td colspan="6"><div class="empty">반납 완료된 이력이 없습니다.</div></td></tr>`:returned.map(c=>{
      const eqList=(c.equipIds||[]).map(id=>`<div class="req-eq-row">${eqTag(id)}</div>`).join('');
      return`<tr>
        <td>${c.person}</td><td>${c.project||'—'}</td>
        <td style="min-width:200px">${eqList}</td>
        <td>${c.outDate}</td><td>${c.returnedDate||'—'}</td>
        <td style="font-size:12px;color:#888">${c.note||'—'}</td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function render(){
  checkOverdue();renderStats();
  if(tab==='status')renderStatus();
  else if(tab==='admin')renderAdmin();
  else if(tab==='equipment')renderEquipment();
  else if(tab==='hdd')renderHdd();
  else if(tab==='backup')renderBackup();
  else renderHistory();
}

function switchTab(t,el){
  tab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  TABS.forEach(x=>{document.getElementById('tab-'+x).style.display=x===t?'':'none';});
  render();
}

// 반출 신청 모달 — 매번 완전 초기화
function openRequest(){
  document.getElementById('req-person').value='';
  document.getElementById('req-project').value='';
  document.getElementById('req-out').value=today();
  document.getElementById('req-ret').value='';
  document.getElementById('req-note').value='';
  document.getElementById('req-search').value='';
  const cats=[...new Set(EQ.map(e=>e.cat))];
  const catSel=document.getElementById('req-cat-filter');
  catSel.innerHTML='<option value="">전체</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
  buildReqList('','');
  document.getElementById('modal-request').classList.add('open');
}

function buildReqList(search,cat){
  const filtered=EQ.filter(e=>(!cat||e.cat===cat)&&(!search||e.name.toLowerCase().includes(search)||e.code.toLowerCase().includes(search)));
  document.getElementById('req-eq-list').innerHTML=filtered.map(e=>{
    const st=eqStatus(e.id);
    const isOut=st!=='in';
    return`<label class="eq-check-item${isOut?' disabled':''}">
      <input type="checkbox" data-eq="${e.id}" ${isOut?'disabled':''} onchange="updateReqSummary()">
      <div class="eq-check-info">
        <div class="eq-check-name"><span class="eq-code">${e.code}</span> <span class="eq-name">${e.name}</span></div>
        <div class="eq-check-sub">${e.cat}${e.note?' · '+e.note:''}</div>
      </div>
      <div>${isOut?`<span class="badge badge-out" style="font-size:10px">반출 중</span>`:''}</div>
    </label>`;
  }).join('');
  updateReqSummary();
}

function filterReqList(){
  const search=document.getElementById('req-search').value.toLowerCase();
  const cat=document.getElementById('req-cat-filter').value;
  // 현재 체크된 항목 기억
  const checked=new Set([...document.querySelectorAll('#req-eq-list input[type=checkbox]:checked')].map(i=>i.dataset.eq));
  const filtered=EQ.filter(e=>(!cat||e.cat===cat)&&(!search||e.name.toLowerCase().includes(search)||e.code.toLowerCase().includes(search)));
  document.getElementById('req-eq-list').innerHTML=filtered.map(e=>{
    const st=eqStatus(e.id);
    const isOut=st!=='in';
    const wasChecked=checked.has(e.id)&&!isOut;
    return`<label class="eq-check-item${isOut?' disabled':''}">
      <input type="checkbox" data-eq="${e.id}" ${isOut?'disabled':''} ${wasChecked?'checked':''} onchange="updateReqSummary()">
      <div class="eq-check-info">
        <div class="eq-check-name"><span class="eq-code">${e.code}</span> <span class="eq-name">${e.name}</span></div>
        <div class="eq-check-sub">${e.cat}${e.note?' · '+e.note:''}</div>
      </div>
      <div>${isOut?`<span class="badge badge-out" style="font-size:10px">반출 중</span>`:''}</div>
    </label>`;
  }).join('');
  updateReqSummary();
}

function updateReqSummary(){
  const checked=[...document.querySelectorAll('#req-eq-list input[type=checkbox]:checked')];
  document.getElementById('req-selected-summary').textContent=checked.length?`${checked.length}개 장비 선택됨`:'';
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function submitRequest(){
  const person=document.getElementById('req-person').value.trim();
  const project=document.getElementById('req-project').value.trim();
  const outDate=document.getElementById('req-out').value;
  const returnDate=document.getElementById('req-ret').value;
  const equipIds=[...document.querySelectorAll('#req-eq-list input[type=checkbox]:checked')].map(i=>i.dataset.eq);
  if(!person||!outDate||!returnDate){alert('신청자, 반출일, 예정 반납일을 입력해주세요.');return;}
  if(!equipIds.length){alert('장비를 1개 이상 선택해주세요.');return;}
  const now=new Date();
  const createdAt=`${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  REQUESTS.unshift({id:'r'+Date.now(),person,project,outDate,returnDate,equipIds,note:document.getElementById('req-note').value.trim(),status:'pending',createdAt});
  saveAll();showToast('반출 신청 완료! 관리자 승인을 기다려주세요.');closeModal('modal-request');render();
}

function approveRequest(id){
  const r=REQUESTS.find(x=>x.id===id);
  if(!r)return;
  r.status='approved';
  CO.unshift({id:'c'+Date.now(),person:r.person,project:r.project,equipIds:r.equipIds,outDate:r.outDate,returnDate:r.returnDate,note:r.note,status:r.returnDate<today()?'overdue':'out',returnedDate:''});
  saveAll();showToast('승인 완료');render();
}

function rejectRequest(id){
  const r=REQUESTS.find(x=>x.id===id);
  if(!r||!confirm('신청을 반려하시겠습니까?'))return;
  r.status='rejected';saveAll();showToast('반려 처리됨');render();
}

function returnAll(id){
  const c=CO.find(x=>x.id===id);
  if(!c||!confirm('해당 반출건을 반납 처리하시겠습니까?'))return;
  c.status='returned';c.returnedDate=today();saveAll();showToast('반납 처리 완료');render();
}

function showPdf(id){
  const c=CO.find(x=>x.id===id);
  if(!c)return;
  const eqs=(c.equipIds||[]).map(id=>getEq(id));
  const rows=eqs.map((e,i)=>`<tr><td>${i+1}</td><td>${e.code}</td><td>${e.cat}</td><td>${e.name}</td><td>1</td><td></td></tr>`).join('');
  document.getElementById('pdf-content').innerHTML=`
    <h2>(주)브이닷 장비 반출 신청서</h2>
    <div class="meta">
      <div class="meta-item"><span class="meta-label">신청자</span><strong>${c.person}</strong></div>
      <div class="meta-item"><span class="meta-label">프로젝트</span><strong>${c.project||'—'}</strong></div>
      <div class="meta-item"><span class="meta-label">반출일</span><strong>${c.outDate}</strong></div>
      <div class="meta-item"><span class="meta-label">예정 반납일</span><strong>${c.returnDate}</strong></div>
      ${c.note?`<div class="meta-item" style="grid-column:span 2"><span class="meta-label">메모</span>${c.note}</div>`:''}
    </div>
    <table>
      <thead><tr><th>NO</th><th>코드</th><th>분류</th><th>장비명</th><th>수량</th><th>확인</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="sign-area">
      <div class="sign-box"><div class="sign-label">신청자</div><div class="sign-name">${c.person}</div></div>
      <div class="sign-box"><div class="sign-label">승인자</div><div class="sign-name">${approver}</div></div>
      <div class="sign-box"><div class="sign-label">반납 확인</div><div class="sign-name"></div></div>
    </div>`;
  document.getElementById('modal-pdf').classList.add('open');
}

function openApproverModal(){
  document.getElementById('approver-select').value=approver;
  document.getElementById('modal-approver').classList.add('open');
}
function saveApprover(){
  approver=document.getElementById('approver-select').value;
  saveAll();showToast(`승인자: ${approver}`);closeModal('modal-approver');render();
}

function openHdd(){
  document.getElementById('hdd-project').value='';
  const hddEqs=EQ.filter(e=>e.cat==='SSD'||e.cat==='HDD');
  const usedIds=HDD_PROJECTS.flatMap(p=>p.equipIds||[]);
  document.getElementById('hdd-eq-list').innerHTML=hddEqs.map(e=>{
    const used=usedIds.includes(e.id);
    return`<label class="eq-check-item${used?' disabled':''}">
      <input type="checkbox" data-eq="${e.id}" ${used?'disabled':''}>
      <div class="eq-check-info">
        <div class="eq-check-name"><span class="eq-code">${e.code}</span> <span class="eq-name">${e.name}</span></div>
        <div class="eq-check-sub">${e.cat}</div>
      </div>
      ${used?'<span style="font-size:11px;color:#aaa">배정됨</span>':''}
    </label>`;
  }).join('');
  document.getElementById('modal-hdd').classList.add('open');
}

function submitHdd(){
  const project=document.getElementById('hdd-project').value.trim();
  if(!project){alert('프로젝트명을 입력해주세요.');return;}
  const equipIds=[...document.querySelectorAll('#hdd-eq-list input[type=checkbox]:checked')].map(i=>i.dataset.eq);
  if(!equipIds.length){alert('외장하드를 1개 이상 선택해주세요.');return;}
  HDD_PROJECTS.push({id:'h'+Date.now(),project,equipIds});
  saveAll();showToast('프로젝트 연결 완료');closeModal('modal-hdd');render();
}

function deleteHddProject(id){
  if(!confirm('이 프로젝트 연결을 삭제하시겠습니까?'))return;
  HDD_PROJECTS=HDD_PROJECTS.filter(p=>p.id!==id);
  saveAll();showToast('삭제 완료');render();
}

loadData();render();
</script>
</body>
</html>
